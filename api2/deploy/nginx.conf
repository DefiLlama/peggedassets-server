# Stablecoin API - nginx config
#
# Static file serving for pre-computed JSON cache files,
# with fallback to Node.js for computed routes and chain name normalization.
#
# Usage:
#   1. Copy this file to /etc/nginx/sites-available/stablecoin-api.conf
#   2. Replace placeholders (CACHE_DIR, NODE_BACKEND_PORT, NGINX_LISTEN_PORT)
#      with values from env.example or your deployment config
#   3. ln -s /etc/nginx/sites-available/stablecoin-api.conf /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx

upstream node_backend {
    server 127.0.0.1:5000;  # NODE_BACKEND_PORT
    keepalive 16;
}

# Route requests with ?stablecoin= query param to Node.js backend
map $arg_stablecoin $force_backend {
    ""      0;
    default 1;
}

server {
    listen 5001;  # NGINX_LISTEN_PORT
    server_name _;

    # All cache files are JSON
    default_type application/json;
    charset utf-8;

    # CORS
    add_header Access-Control-Allow-Origin  '*' always;
    add_header Access-Control-Allow-Methods 'GET,PUT,POST,DELETE,OPTIONS' always;

    # Cache-Control matching the original HyperExpress config
    add_header Cache-Control 'public, max-age=1800' always;

    # Handle preflight
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Root points at the cache directory (contains build/ subdirectory)
    root /app/cache;  # CACHE_DIR

    # -- Computed route: /stablecoincharts/:chain?stablecoin=X --
    # When ?stablecoin= is present, always proxy to Node.js
    location /stablecoincharts/ {
        if ($force_backend) {
            proxy_pass http://node_backend;
            break;
        }
        try_files /build$uri @node_backend;
    }

    # -- Hash endpoint (served by Node.js) --
    location = /hash {
        proxy_pass http://node_backend;
    }

    # -- All other routes: try static file, fallback to Node.js --
    location / {
        try_files /build$uri @node_backend;
    }

    # -- Node.js fallback (handles normalization + computed routes) --
    location @node_backend {
        proxy_pass              http://node_backend;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        Connection "";
    }
}
